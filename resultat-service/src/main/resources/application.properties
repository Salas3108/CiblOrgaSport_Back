# ============================================
# RESULTAT-SERVICE CONFIGURATION
# ============================================

# Application Name
spring.application.name=resultat-service

# Server Configuration
server.port=8087
server.servlet.context-path=/

# Database Configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/glop
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Disable initialization for production
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# JWT Configuration (must match auth-service)
ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
ciblorgasport.app.jwtExpirationMs=86400000

# External Services URLs
auth-service.url=http://localhost:8081

# ============================================
# LOGGING CONFIGURATION
# ============================================

# Application Logs
logging.level.com.ciblorgasport.resultatservice=DEBUG
logging.level.com.ciblorgasport.resultatservice.controller=INFO
logging.level.com.ciblorgasport.resultatservice.service=INFO
logging.level.com.ciblorgasport.resultatservice.security=DEBUG

# Spring Framework Logs
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.orm.jpa=INFO

# Hibernate SQL Logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.stat=DEBUG

# Database Connection Logs
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari=TRACE

# Error Details
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# HEALTH CHECK ENDPOINTS
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always