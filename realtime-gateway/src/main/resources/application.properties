spring.application.name=realtime-gateway

server.port=8093

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=realtime-gateway
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
ciblorgasport.kafka.topics.notifications=notifications-topic

# JWT
ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure

# Abonnement service (for COMPETITION_SUBSCRIBERS routing)
abonnement-service.url=http://localhost:8085

# WebSocket
ciblorgasport.realtime.allowed-origin=http://localhost:3000
