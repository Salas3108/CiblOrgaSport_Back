spring.application.name=ciblorgasport

# Server
server.port=8081

# Database PostgreSQL - CORRECTION ICI
spring.datasource.url=jdbc:postgresql://localhost:5432/glop
spring.datasource.username=admin
spring.datasource.password=password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
ciblorgasport.app.jwtExpirationMs=86400000

# HikariCP (optionnel pour le debugging)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5