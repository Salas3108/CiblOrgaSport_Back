name: Deploy to OVH

on:
  push:
    branches: [deploy/ovh-production]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push all images
        run: |
          SERVICES=(
            "gateway"
            "auth-service"
            "billetterie"
            "event-service"
            "abonnement-service"
            "incident-service"
            "participants-service"
            "resultats-service"
            "analytics-service"
            "geolocation-service"
            "notifications-service"
            "lieu-service"
            "volunteer-service"
          )
          for svc in "${SERVICES[@]}"; do
            echo "=== Building $svc ==="
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ciblorgasport-${svc}:latest ./$svc
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/ciblorgasport-${svc}:latest
          done

      - name: Deploy on OVH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 137.74.133.131
          username: ubuntu
          key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            docker compose -f docker-compose.prod.services.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.services.yml --env-file .env.prod up -d --remove-orphans
            docker image prune -f
            echo "=== Deploy done ==="
            docker ps --format "table {{.Names}}\t{{.Status}}"
