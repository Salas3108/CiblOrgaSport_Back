name: CI Maven Microservices

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - abonnement-service
          - analytics-service
          - auth-service
          - billetterie
          - event-service
          - gateway
          - geolocation-service
          - incident-service
          - lieu-service
          - notifications-service
          - participants-service
          - resultats-service
          - volunteer-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run tests
        working-directory: ${{ matrix.service }}
        run: mvn -B -ntp clean test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/target/surefire-reports/**
            ${{ matrix.service }}/target/site/surefire-report.html
          if-no-files-found: warn
          retention-days: 7
