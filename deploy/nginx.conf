# nginx.conf — vm-gateway
# Reverse proxy HTTP vers Spring Cloud Gateway sur vm-services
# Remplacer <PRIV_SERVICES> par l'IP privée vRack de vm-services
#
# Migration SSL (une fois domaine disponible) :
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d <VOTRE_DOMAINE> --non-interactive --agree-tos -m <EMAIL>

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

upstream gateway {
    server <PRIV_SERVICES>:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # Remplacer par votre domaine quand disponible

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting (30 req/s par IP, burst 50)
    limit_req zone=api burst=50 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Health check Nginx (monitoring interne)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
