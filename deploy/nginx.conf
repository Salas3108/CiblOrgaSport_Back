upstream gateway {
    server 127.0.0.1:8080;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API backend → gateway (avec ou sans slash final)
    location ~ ^/(auth|events|competitions|epreuves|lieux|admin|billets|abonnements|api|incidents|athlete|commissaire|resultats|ws)(/.*)?$ {

        # Preflight CORS : répondre 204 directement sans transmettre au backend
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }

        limit_req zone=api burst=50 nodelay;
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Frontend statique Next.js
    location / {
        root /var/www/ciblorgasport;
        index index.html;
        try_files $uri $uri/ $uri.html /index.html;
    }
}
