spring.application.name=analytics-service
server.port=8090

# PostgreSQL — même base que les autres services
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5400}/${DB_NAME:glop}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT (même secret que les autres services)
ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure

# Logging
logging.level.com.ciblorgasport.analyticsservice=INFO
logging.level.com.ciblorgasport.analyticsservice.scheduler=INFO
