# docker-compose.prod.db.yml — à déployer sur vm-database
# Usage: docker compose -f docker-compose.prod.db.yml --env-file .env.prod up -d

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      # Exposé sur l'interface vRack (IP privée) uniquement — bloquer internet via pare-feu OVH
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: prod-db-net

volumes:
  postgres_data:
    name: ciblorgasport_postgres_data
