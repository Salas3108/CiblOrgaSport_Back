# Server Configuration
server.port=8086
spring.application.name=incident-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5400/glop
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Paris

# Logging
logging.level.com.ciblorgasport.incidentservice=DEBUG
logging.level.org.springframework.web=INFO

# JWT
ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
ciblorgasport.app.jwtExpirationMs=86400000