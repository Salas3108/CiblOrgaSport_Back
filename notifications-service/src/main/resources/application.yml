server:
  port: 8089

spring:
  application:
    name: notifications-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5400/glop}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notifications-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.ciblorgasport.notificationsservice.kafka.event.IncidentCreatedEventV1
        spring.json.trusted.packages: com.ciblorgasport.notificationsservice.kafka.event

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

    listener:
      concurrency: 3

logging:
  level:
    com.ciblorgasport.notificationsservice: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging.simp: WARN
