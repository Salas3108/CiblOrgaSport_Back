spring.application.name=resultats-service

# Server
server.port=8088

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5400/glop
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# JWT
ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
ciblorgasport.app.jwtExpirationMs=86400000

# Inter-service URLs (surchargées par env vars dans Docker)
event-service.url=${EVENT_SERVICE_URL:http://localhost:8084}
participants-service.url=${PARTICIPANTS_SERVICE_URL:http://localhost:8087}
