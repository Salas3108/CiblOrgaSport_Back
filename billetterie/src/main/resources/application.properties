spring.application.name=billetterie

# Server
server.port=8083
server.address=0.0.0.0

# Database PostgreSQL
# Use env variables if present, otherwise fall back to local defaults
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:glop}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Remove explicit dialect (Hibernate selects PostgreSQLDialect automatically)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# HikariCP
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JWT
ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
ciblorgasport.app.jwtExpirationMs=86400000
