server:
  port: 8081

spring:
  datasource:
    url: ${BILL_DB_URL:jdbc:postgresql://localhost:5432/ciblorgasport_billetterie}
    username: ${BILL_DB_USER:postgres}
    password: ${BILL_DB_PASS:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Fail fast if credentials are wrong; helpful for clear errors
      initialization-fail-timeout: 30000
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 2
      # Optional: keep-alive for long-lived apps
      keepalive-time: 300000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        # Removed explicit dialect; Hibernate auto-detects PostgreSQL
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
