 
server.port=8080
spring.application.name=gateway
# Evite les doublons de headers CORS si un microservice en ajoute deja
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=event-service
spring.cloud.gateway.routes[1].uri=http://localhost:8084
spring.cloud.gateway.routes[1].predicates[0]=Path=/events/**,/competitions/**,/epreuves/**,/admin/**

spring.cloud.gateway.routes[2].id=lieu-service
spring.cloud.gateway.routes[2].uri=http://localhost:8090
spring.cloud.gateway.routes[2].predicates[0]=Path=/lieux/**

spring.cloud.gateway.routes[3].id=billetterie
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/billets/**,/abonnements/**,/api/tickets/**

spring.cloud.gateway.routes[4].id=abonnement
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/abonnements/**,/api/abonnements/**

spring.cloud.gateway.routes[5].id=incident-service
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/incidents/**,/api/incidents/**

spring.cloud.gateway.routes[6].id=participants-service
spring.cloud.gateway.routes[6].uri=http://localhost:8087
spring.cloud.gateway.routes[6].predicates[0]=Path=/athlete/**,/api/athlete/**,/commissaire/**,/api/commissaire/**

spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=http://localhost:8089
spring.cloud.gateway.routes[7].predicates[0]=Path=/notifications/**,/api/notifications/**

spring.cloud.gateway.routes[8].id=volunteer-service
spring.cloud.gateway.routes[8].uri=http://localhost:8093
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/admin/programs/**,/api/v1/admin/volunteers/**,/api/v1/volunteers/**

spring.cloud.gateway.routes[9].id=resultats-service
spring.cloud.gateway.routes[9].uri=http://localhost:8088
spring.cloud.gateway.routes[9].predicates[0]=Path=/resultats/**,/api/resultats/**
# Analytics service
analytics.service.url=http://localhost:8092

ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
jwt.secret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure

# Monitoring (Actuator + Prometheus)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=local
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.50,0.95,0.99
management.metrics.enable.http.server.requests=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
