 
server.port=8080
spring.application.name=gateway
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=volunteer-service
spring.cloud.gateway.routes[1].uri=http://localhost:8090
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/admin/programs/**,/api/v1/admin/volunteers/**,/api/v1/volunteers/**

spring.cloud.gateway.routes[2].id=event-service
spring.cloud.gateway.routes[2].uri=http://localhost:8084
spring.cloud.gateway.routes[2].predicates[0]=Path=/events/**,/competitions/**,/epreuves/**,/lieux/**,/admin/**

spring.cloud.gateway.routes[3].id=billetterie
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/billets/**,/abonnements/**,/api/tickets/**

spring.cloud.gateway.routes[4].id=abonnement
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/abonnements/**,/api/abonnements/**

spring.cloud.gateway.routes[5].id=incident-service
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/incidents/**,/api/incidents/**

spring.cloud.gateway.routes[6].id=participants-service
spring.cloud.gateway.routes[6].uri=http://localhost:8087
spring.cloud.gateway.routes[6].predicates[0]=Path=/athlete/**,/api/athlete/**,/commissaire/**,/api/commissaire/**

ciblorgasport.app.jwtSecret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
jwt.secret=mySuperSecretKeyForCiblorgasportApplicationThatIsVeryLongAndSecure
